name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # 브랜치별로 다른 태그 생성 (main -> latest, dev -> dev)
          TAG=${{ github.ref_name == 'main' && 'latest' || 'dev' }}
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/akiba-backend:$TAG .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/akiba-backend:$TAG

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH to EC2 and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 환경 변수 세팅 (이미지 태그용)
            BRANCH=${{ github.ref_name }}
            export IMAGE_TAG=$([ "$BRANCH" == "main" ] && echo "latest" || echo "dev")
            export SERVICE_NAME=$([ "$BRANCH" == "main" ] && echo "app-prod" || echo "app-dev")
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            # 2. 서버의 프로젝트 폴더로 이동 (폴더명은 본인 경로에 맞게 수정하세요)
            cd /home/ubuntu/

            # 3. 최신 이미지 받아오기
            docker pull $DOCKERHUB_USERNAME/akiba-backend:$IMAGE_TAG

            # 4. docker-compose로 해당 서비스만 재실행
            # --no-deps: 의존성 서비스(DB 등)는 건드리지 않고 앱만 재시작
            docker compose up -d --no-deps $SERVICE_NAME
