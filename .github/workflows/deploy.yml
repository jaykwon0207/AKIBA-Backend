name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # 브랜치별로 다른 태그 생성 (main -> latest, dev -> dev)
          TAG=${{ github.ref_name == 'main' && 'latest' || 'dev' }}
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/akiba-backend:$TAG .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/akiba-backend:$TAG

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH to EC2 and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 브랜치에 따라 사용할 컴포즈 파일과 서비스명 결정
            BRANCH=${{ github.ref_name }}
            
            # main이면 prod 설정파일/서비스, 아니면(dev) dev 설정파일/서비스 사용
            COMPOSE_FILE=$([ "$BRANCH" == "main" ] && echo "docker-compose.prod.yml" || echo "docker-compose.dev.yml")
            SERVICE_NAME=$([ "$BRANCH" == "main" ] && echo "app-prod" || echo "app-dev")
            
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            export IMAGE_TAG=$([ "$BRANCH" == "main" ] && echo "latest" || echo "dev")

            # 2. 서버 프로젝트 폴더 이동
            cd /home/ubuntu/

            # 3. 해당 환경의 이미지 pull 및 배포 (파일 지정 -f 사용)
            docker compose -f $COMPOSE_FILE pull $SERVICE_NAME
            docker compose -f $COMPOSE_FILE up -d --no-deps $SERVICE_NAME
            
            # 4. 배포 후 불필요한 이미지 정리
            docker image prune -f
