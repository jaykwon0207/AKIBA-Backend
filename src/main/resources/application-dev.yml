spring:
  datasource:
    url: jdbc:mysql://db-dev:3306/${DB_NAME}
    username: root
    password: ${DEV_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

naver:
  client-id: ${NAVER_CLIENT_ID}
  client-secret: ${NAVER_CLIENT_SECRET}

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-expiry: 86400000
  refresh-token-expiry: 1209600000

